<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password | Quiz Campus</title>
  <link rel="stylesheet" href="styles/general.css" />
  <link rel="stylesheet" href="styles/forgetPassword.css" />
</head>
<body>
  <main>
    <form id="reset-form">
      <h2>Reset Your Password</h2>

      <input
        type="password"
        id="new-password"
        placeholder="Enter new password"
        required
      />
      <input
        type="password"
        id="confirm-password"
        placeholder="Confirm new password"
        required
      />

      <button class="bg-teal-green text-white" type="submit">Reset Password</button>

      <p id="message"></p>
    </form>
  </main>

  <script>
    const form = document.getElementById('reset-form');
    const message = document.getElementById('message');

    // Grab token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (newPassword.length < 8) {
  message.textContent = 'Password must be at least 8 characters long';
  return;
}

      if (newPassword !== confirmPassword) {
        message.textContent = '❌ Passwords do not match';
        return;
      }

      try {
        const response = await fetch('https://quiz-campus-backend-new.onrender.com/reset-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ token, newPassword })
        });

        const data = await response.json();

        if (response.ok) {
          message.textContent = 'Password reset successful! Redirecting...';
          setTimeout(() => {
            window.location.href = '/signin.html';
          }, 2000);
        } else {
          message.textContent = `❌ ${data.message}`;
        }
      } catch (err) {
        message.textContent = '❌ Something went wrong';
      }
    });
  </script>
</body>
</html>
